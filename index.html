<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Resume Ranker</title>
    <style>
        /* [Your existing styles stay exactly the same] */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab-button {
            flex: 1;
            padding: 15px;
            background: rgba(255,255,255,0.2);
            color: white;
            border: none;
            border-radius: 10px 10px 0 0;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s;
        }

        .tab-button.active {
            background: white;
            color: #667eea;
        }

        .tab-content {
            display: none;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .tab-content.active {
            display: block;
        }

        .upload-section h2,
        .search-section h2 {
            margin-bottom: 20px;
            color: #333;
        }

        .file-upload-area {
            border: 3px dashed #667eea;
            border-radius: 10px;
            padding: 40px;
            text-align: center;
            margin-bottom: 20px;
            transition: all 0.3s;
            cursor: pointer;
        }

        .file-upload-area:hover {
            background: #f8f9ff;
            border-color: #764ba2;
        }

        .file-upload-area.dragover {
            background: #e8ebff;
            border-color: #764ba2;
        }

        input[type="file"] {
            display: none;
        }

        .file-info {
            margin: 10px 0;
            color: #666;
            font-size: 14px;
        }

        .filter-form {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        .form-group label {
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        .form-group input,
        .form-group select {
            padding: 12px 15px;
            font-size: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            outline: none;
            transition: border 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus {
            border-color: #667eea;
        }

        .skills-selector {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 8px;
        }

        .skill-chip {
            padding: 8px 15px;
            background: #e8ebff;
            color: #667eea;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
            font-size: 14px;
        }

        .skill-chip:hover {
            background: #d0d5ff;
        }

        .skill-chip.selected {
            background: #667eea;
            color: white;
            border-color: #764ba2;
        }

        .custom-skill-input {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .custom-skill-input input {
            flex: 1;
        }

        .custom-skill-input button {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        button {
            padding: 15px 30px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .results-section {
            display: none;
        }

        .results-header {
            color: white;
            margin-bottom: 20px;
            font-size: 1.8em;
        }

        .filter-summary {
            background: rgba(255,255,255,0.2);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            color: white;
        }

        .filter-summary strong {
            display: block;
            margin-bottom: 5px;
        }

        .result-card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            margin-bottom: 20px;
            transition: transform 0.3s;
            position: relative;
            overflow: hidden;
        }

        .result-card:hover {
            transform: translateY(-5px);
        }

        .result-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 5px;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .rank-badge {
            display: inline-block;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 28px;
            font-weight: bold;
            line-height: 60px;
            text-align: center;
            margin-right: 20px;
            float: left;
            box-shadow: 0 4px 10px rgba(102, 126, 234, 0.3);
        }

        .result-content {
            overflow: hidden;
        }

        .result-name {
            font-size: 26px;
            font-weight: bold;
            color: #333;
            margin-bottom: 12px;
        }

        .result-details {
            color: #666;
            margin-bottom: 15px;
            line-height: 1.8;
        }

        .result-details p {
            margin: 8px 0;
        }

        .skills-container {
            margin-top: 15px;
        }

        .skill-tag {
            display: inline-block;
            background: #e8ebff;
            color: #667eea;
            padding: 6px 16px;
            border-radius: 20px;
            margin: 5px 5px 5px 0;
            font-size: 14px;
            font-weight: 500;
        }

        .match-score {
            font-size: 22px;
            font-weight: bold;
            color: #667eea;
            margin: 12px 0;
        }

        .match-score-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 8px;
        }

        .match-score-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.5s ease;
        }

        .ranking-reason {
            background: #f8f9ff;
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
            border-left: 4px solid #667eea;
            line-height: 1.6;
        }

        .loading {
            text-align: center;
            padding: 40px;
            display: none;
        }

        .spinner {
            border: 5px solid #f3f3f3;
            border-top: 5px solid #667eea;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            font-size: 18px;
            color: white;
            font-weight: 500;
        }

        .error-message, .success-message {
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
        }

        .error-message {
            background: #f8d7da;
            color: #721c24;
            border-left: 4px solid #dc3545;
        }

        .success-message {
            background: #d4edda;
            color: #155724;
            border-left: 4px solid #28a745;
        }

        .stats-info {
            background: #e8ebff;
            padding: 10px 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            color: #667eea;
            font-weight: 500;
        }

        .helper-text {
            font-size: 13px;
            color: #666;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 AI Resume Ranker</h1>

        <div class="tabs">
            <button class="tab-button active" onclick="switchTab('upload')">📤 Upload Resumes</button>
            <button class="tab-button" onclick="switchTab('search')">🔍 Search & Rank</button>
        </div>

        <div id="uploadTab" class="tab-content active">
            <div class="upload-section">
                <h2>Upload Resume</h2>
                <div class="success-message" id="uploadSuccessMessage"></div>
                <div class="error-message" id="uploadErrorMessage"></div>

                <div class="file-upload-area" id="uploadArea" onclick="document.getElementById('resumeFile').click()">
                    <p style="font-size: 48px; margin-bottom: 10px;">📄</p>
                    <p style="font-size: 18px; font-weight: bold; margin-bottom: 10px;">Click to upload or drag and drop</p>
                    <p class="file-info">Supported formats: PDF, DOCX, TXT</p>
                    <p class="file-info" id="selectedFileName"></p>
                </div>
                <input type="file" id="resumeFile" accept=".pdf,.docx,.txt" multiple onchange="handleFileSelect(event)">
                <button onclick="uploadResume()" id="uploadButton" disabled>Upload Resumes</button>

                <div id="uploadProgress" style="display: none; margin-top: 20px;">
                    <div style="background: #e0e0e0; border-radius: 10px; height: 30px; overflow: hidden;">
                        <div id="progressBar" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); height: 100%; width: 0%; transition: width 0.3s; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold;"></div>
                    </div>
                    <p id="progressText" style="text-align: center; margin-top: 10px; color: #667eea; font-weight: 500;"></p>
                </div>
            </div>
        </div>

        <div id="searchTab" class="tab-content">
            <div class="search-section">
                <h2>Smart Resume Search & Ranking</h2>
                <form class="filter-form" onsubmit="event.preventDefault(); rankResumes();">
                    <div class="form-group full-width">
                        <label for="jobRole">Job Role / Position *</label>
                        <input type="text" id="jobRole" placeholder="e.g., Senior Backend Developer" required>
                    </div>
                    <div class="form-group"><label for="location">Location</label><input type="text" id="location"></div>
                    <div class="form-group"><label for="domain">Domain</label><input type="text" id="domain"></div>
                    <div class="form-group"><label for="minExperience">Min Experience</label><input type="number" id="minExperience"></div>
                    <div class="form-group">
                        <label for="companyType">Company Type</label>
                        <select id="companyType"><option value="">Any</option><option value="product">Product</option></select>
                    </div>
                    <div class="form-group full-width">
                        <label>Skills</label>
                        <div class="skills-selector" id="skillsSelector">
                            <span class="skill-chip" onclick="toggleSkill(this, 'Python')">Python</span>
                            <span class="skill-chip" onclick="toggleSkill(this, 'Django')">Django</span>
                        </div>
                    </div>
                    <div class="form-group full-width"><button type="submit" id="rankButton">🚀 Find & Rank Candidates</button></div>
                </form>
            </div>
            <div class="loading" id="rankLoading"><div class="spinner"></div></div>
            <div class="results-section" id="resultsSection"></div>
        </div>
    </div>

    <script>
        let selectedFiles = [];
        let selectedSkills = [];

        function switchTab(tab) {
            const uploadTab = document.getElementById('uploadTab');
            const searchTab = document.getElementById('searchTab');
            const tabButtons = document.querySelectorAll('.tab-button');
            tabButtons.forEach(btn => btn.classList.remove('active'));
            if (tab === 'upload') {
                uploadTab.classList.add('active'); searchTab.classList.remove('active'); tabButtons[0].classList.add('active');
            } else {
                uploadTab.classList.remove('active'); searchTab.classList.add('active'); tabButtons[1].classList.add('active');
            }
        }

        function toggleSkill(element, skill) {
            element.classList.toggle('selected');
            const index = selectedSkills.indexOf(skill);
            if (index > -1) selectedSkills.splice(index, 1); else selectedSkills.push(skill);
        }

        function handleFileSelect(event) {
            const files = Array.from(event.target.files);
            if (files.length > 0) {
                selectedFiles = files;
                document.getElementById('selectedFileName').textContent = `Selected ${files.length} file(s)`;
                document.getElementById('uploadButton').disabled = false;
            }
        }

        // UPDATED FETCH URL
        async function uploadResume() {
            if (selectedFiles.length === 0) return;
            const uploadButton = document.getElementById('uploadButton');
            const progressDiv = document.getElementById('uploadProgress');
            const progressBar = document.getElementById('progressBar');
            uploadButton.disabled = true;
            progressDiv.style.display = 'block';

            for (let i = 0; i < selectedFiles.length; i++) {
                const file = selectedFiles[i];
                try {
                    const formData = new FormData();
                    formData.append('resume_file', file);

                    // CHANGED FROM '/resumes/upload/' TO '/upload/'
                    const response = await fetch('/upload/', {
                        method: 'POST',
                        body: formData
                    });

                    const data = await response.json();
                    const progress = Math.round(((i + 1) / selectedFiles.length) * 100);
                    progressBar.style.width = progress + '%';
                } catch (error) {
                    console.error('Error:', error);
                }
            }
            alert('Processing finished. Check terminal for details.');
            location.reload();
        }

        // UPDATED FETCH URL
        async function rankResumes() {
            const jobRole = document.getElementById('jobRole').value;
            const rankButton = document.getElementById('rankButton');
            rankButton.disabled = true;
            document.getElementById('rankLoading').style.display = 'block';

            try {
                // CHANGED FROM '/resumes/rank/' TO '/rank/'
                const response = await fetch('/rank/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        job_role: jobRole,
                        location: document.getElementById('location').value,
                        domain: document.getElementById('domain').value,
                        min_experience: parseInt(document.getElementById('minExperience').value) || 0,
                        required_skills: selectedSkills,
                    })
                });

                const data = await response.json();
                if (data.success) displayResults(data.ranked_resumes, jobRole);
            } catch (error) {
                console.error('Error:', error);
            } finally {
                document.getElementById('rankLoading').style.display = 'none';
                rankButton.disabled = false;
            }
        }

        function displayResults(rankedResumes, jobRole) {
            const resultsSection = document.getElementById('resultsSection');
            resultsSection.innerHTML = `<h2>Results for ${jobRole}</h2>`;
            rankedResumes.forEach((resume, index) => {
                resultsSection.innerHTML += `
                    <div class="result-card">
                        <div class="rank-badge">${index + 1}</div>
                        <div class="result-content">
                            <div class="result-name">${resume.name}</div>
                            <p>Score: ${resume.match_score}</p>
                            <div class="ranking-reason">${resume.ranking_reason}</div>
                        </div>
                    </div>`;
            });
            resultsSection.style.display = 'block';
        }
    </script>
</body>
</html>
